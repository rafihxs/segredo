<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossa História</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b12;
color:white;
}

.topbar{
padding:15px;
background:black;
font-weight:bold;
}

/* HOME */
#home{
padding:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:10px;
}

.card{
background:#1a1a24;
padding:15px;
border-radius:10px;
cursor:pointer;
opacity:0.5;
transition:0.3s;
position:relative;
}

.card.active{opacity:1;}
.card:hover{transform:scale(1.03);}

.lock{
position:absolute;
top:10px;
right:10px;
font-size:14px;
opacity:0.8;
}

/* PLAYER */
#player{
display:none;
padding:20px;
}

.screen{
background:#111;
padding:20px;
border-radius:10px;
min-height:200px;
white-space:pre-line;
line-height:1.5;
}

/* DETAIL */
.detail{
margin-top:15px;
padding:10px;
background:rgba(255,255,255,0.08);
border-radius:8px;
font-size:13px;
cursor:pointer;
opacity:0.7;
}

/* LOCK */
#lock{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

input{
padding:10px;
border:none;
border-radius:8px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#e50914;
color:white;
cursor:pointer;
}

.popup{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:black;
padding:12px;
border-radius:10px;
animation:fade 0.3s;
}

@keyframes fade{
from{opacity:0;transform:translate(-50%,10px);}
to{opacity:1;transform:translate(-50%,0);}
}
</style>
</head>

<body>

<div class="topbar">
NOSSA HISTÓRIA • DATA MARCANTE: 04/01
</div>

<!-- HOME -->
<div id="home">

<h2>Capítulos</h2>

<div class="grid">

<div class="card active" onclick="openEp(1)">Ep. 1</div>
<div class="card" id="c2" onclick="openEp(2)">Ep. 2</div>
<div class="card" id="c3" onclick="openEp(3)">Ep. 3</div>
<div class="card" id="c4" onclick="openEp(4)">Ep. 4 (04/01)</div>
<div class="card" id="c5" onclick="openEp(5)">Ep. 5</div>
<div class="card" id="c6" onclick="openEp(6)">Final 🔒</div>

</div>

</div>

<!-- PLAYER -->
<div id="player">

<div class="screen" id="screen"></div>

<div class="detail" onclick="showDetail()">
💡 detalhe oculto
</div>

<button onclick="back()">Voltar</button>

</div>

<!-- LOCK -->
<div id="lock">
<h2>Capítulo Final Bloqueado</h2>
<p>Digite a senha</p>
<input id="pass" placeholder="04/01">
<button onclick="check()">Entrar</button>
</div>

<script>

let current = parseInt(localStorage.getItem("p") || "1");
let typing = false;
let epAtual = 1;

/* TEXTOS */
const ep = {

1:`Ela entrou na minha vida de forma leve e natural.
Sem pressa, sem forçar nada.

E aos poucos isso virou algo importante pra mim.`,

2:`Existem dias difíceis.
Cansaço, dor, trabalho, silêncio.

E eu aprendi que nesses momentos o mais importante é respeitar o espaço dela.`,

3:`Eu errei em alguns momentos.
Pressionei quando deveria ter esperado.
Falei ou agi errado quando deveria ter entendido melhor.

Hoje eu reconheço isso com maturidade.`,

4:`A data 04/01 não é apenas um dia.
É algo que marcou o começo de uma história que ficou em mim.

Algo simples, mas significativo.`,

5:`O passado deixa marcas.
E eu respeito isso profundamente.

Eu não quero ser mais um peso na vida dela.
Quero ser alguém leve e tranquilo.`,

6:`Eu não quero te prender.
Nem te pressionar.
Nem te fazer se sentir desconfortável.

Mas eu preciso ser sincero sobre o que eu sinto.

Eu penso em você.
Muito mais do que você imagina.

No trabalho, no serviço, nos momentos mais corridos do dia,
você aparece na minha mente.

E eu reconheço que nem sempre eu acerto.

Já errei com você.
Já falei ou fiz coisas que te deixaram estressada.
Já não respeitei como deveria em alguns momentos.
E isso não me orgulha.

Se em algum momento eu te deixei desconfortável, pressionada ou cansada,
eu te peço desculpa de verdade.

Não como palavra vazia,
mas como alguém que entende o próprio erro.

Eu não quero ser um erro na sua vida.
Eu quero ser alguém que aprende, melhora e respeita.

E se ainda existir espaço,
eu quero fazer tudo diferente daqui pra frente.`
};

/* DETALHES */
const detail = {
1:"Tudo começou leve.",
2:"Respeito é essencial.",
3:"Errar faz parte de crescer.",
4:"04/01 ficou marcado em mim.",
5:"Eu entendo suas dores.",
6:"rafihx te ama muito ♥️"
};

function openEp(n){

if(typing) return;

epAtual = n;

if(n === 6){
document.getElementById("lock").style.display="flex";
return;
}

if(n > current) return;

document.getElementById("home").style.display="none";
document.getElementById("player").style.display="block";

type(ep[n]);

if(n === current && current < 6){
current++;
localStorage.setItem("p",current);
unlock();
}
}

function unlock(){
for(let i=2;i<=current;i++){
let c=document.getElementById("c"+i);
if(c) c.classList.add("active");
}
}

function type(text){
let i=0;
let el=document.getElementById("screen");
el.innerHTML="";
typing=true;

let t=setInterval(()=>{
el.innerHTML+=text.charAt(i);
i++;
if(i>=text.length){
typing=false;
clearInterval(t);
}
},15);
}

function showDetail(){
let p=document.createElement("div");
p.className="popup";
p.innerText=detail[epAtual];
document.body.appendChild(p);
setTimeout(()=>p.remove(),3000);
}

function back(){
document.getElementById("home").style.display="block";
document.getElementById("player").style.display="none";
}

/* SENHA */
function check(){
let v=document.getElementById("pass").value;

if(v === "04/01"){
document.getElementById("lock").style.display="none";
document.getElementById("home").style.display="none";
document.getElementById("player").style.display="block";
type(ep[6]);
}else{
alert("Senha incorreta");
}
}

unlock();

</script>

</body>
</html>
